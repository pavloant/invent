<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Inventorio</title>
    <!-- <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1"> -->
    <link rel="stylesheet" href="main.css">
    <!-- font awesome 6 -->
    <script src="https://kit.fontawesome.com/5da8aa22cb.js" crossorigin="anonymous"></script>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mukta&family=Staatliches&display=swap" rel="stylesheet">
</head>

<body>

    <!-- HEADER SECTION -->

    <!-- MAIN NAVIGATION -->

    <header class="main-header">

        <div class="main-nav__logo">
            <h1><i class="fas fa-dolly fa-lg"></i> Inventorio</h1>
        </div>

        <nav class="main-nav">
            <ul class="main-nav__items">
                <li class="main-nav__item">
                    <a href="#"><i class="fas fa-plus-circle"></i> Add item</a>
                </li>
                <li class="main-nav__item">
                    <a href="#"><i class="fas fa-sign-out-alt"></i> Log out</a>
                </li>
            </ul>
        </nav>
   </header>
        <!-- SEARCH BAR -->

        <div class="search-bar">
            <p class="search-bar__position search-bar__mag-glass"><i class="fas fa-search"></i></p>
            <input type="text" class="search-bar__position search-bar__input-text">
            <form class="search-bar__position">
                <select>
                    <option>Everything</option>
                    <option>Sound</option>
                    <option>Printers</option>
                    <option>Headphones</option>
                </select>
            </form>
            <button class="search-bar__position">Search</button>
        </div>



    <!-- MAIN SECTION  -->

    <main class="main-container">
        <div class="database-container">
            This is where the database will show up...
        </div>
    </main>

    <!-- FOOTER SECTION  -->

    <footer>
        <p>Inventorio - Magazyn Petendo 2021</p>
    </footer>


</body>

</html>
